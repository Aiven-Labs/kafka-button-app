<!-- templates/index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Don't Push the Button - Aiven for Apache Kafka Workshop</title>
    <!-- HTMX for seamless interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
      <script src="https://unpkg.com/htmx-ext-sse@2.2.2"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .fade-in {
        animation: fadeIn 1.0s;
      }
      @keyframes fadeIn {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <section>
    <div class="fade-in bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <div class="flex flex-col items-center">
        <!-- Button with HTMX attributes -->
        <button
          class="bg-rose-600 text-white font-semibold py-6 px-6 rounded-2xl transition-colors shadow-xl"
          hx-post="/send-ip"
          hx-trigger="click"
          hx-target="#result"
          hx-swap="innerHTML"
          id="result"
        >
          {% include "partials/button_text.html" %}
        </button>

      <div
        class="mt-8 pt-4 border-t border-gray-200 text-center text-xs text-gray-500"
      >
        <p>FastAPI + HTMX + Kafka Demo</p>
      </div>
    </div>
 </section>
  <section class="overflow-y-auto border p-4 rounded-md m-4 h-48 max-w-1/2">
    <div class="click-log">
      <h2 class="text-xl font-semibold">Button Click Log</h2>
      <div>
          <ul id="message-log">
          </ul>
            <!-- SSE events will be inserted here -->
      </div>
    </div>
  </section>

  <!-- Script for streaming -->
  <script>
    const evtSource = new EventSource("/click-log");
    evtSource.onmessage = function(event) {
      document.getElementById("message-log").innerHTML += `<li class="fade-in">${event.data}</li>`;
      }
  </script>
  </body>
</html>
